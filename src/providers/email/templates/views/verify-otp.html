<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
        text-align: center;
      }
      .container {
        max-width: 400px;
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        margin: auto;
      }
      .otp {
        font-size: 24px;
        font-weight: bold;
        color: #333;
        letter-spacing: 5px;
        margin: 20px 0;
      }
      .footer {
        margin-top: 20px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Verify Your OTP</h2>
      <p>Your One-Time Password (OTP) is:</p>
      <div class="otp">{{otp}}</div>
      <p>Please enter this OTP to verify your email.</p>
      <p>If you did not request this, please ignore this email</p>
      <div class="footer">
        <p>&copy; 2025 Byldd</p>
      </div>
    </div>
  </body>
</html>
